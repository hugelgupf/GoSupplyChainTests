name: Automated Git Release

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *' 

permissions:
  contents: write

jobs:
  write-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure github actions bot
        run: |
          # Configure Git to identify as the official GitHub Actions bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate Monotonic Version Tag
        id: create_tag
        run: |
          # Format: always increasing numerically: v1.YYYYMMDD.SECONDS_SINCE_MIDNIGHT
          DATE_PART=$(date +'%Y%m%d')
          
          # Get seconds since midnight. 
          # Semver requires no leading 0s, which HHMMSS would have.
          SECONDS_PART=$(( $(date +%-H) * 3600 + $(date +%-M) * 60 + $(date +%-S) ))
          
          TAG_NAME="nightlyrelease/v1.${DATE_PART}.${SECONDS_PART}"
          echo "Generated Tag: $TAG_NAME"
          
          git tag -a "$TAG_NAME" -m "Daily automated release $TAG_NAME"
          git push origin "$TAG_NAME"
          
